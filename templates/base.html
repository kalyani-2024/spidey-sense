<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}SPIDEY SENSE{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

<canvas id="web-bg"></canvas>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash-stack">
      {% for msg in messages %}
        <div class="flash-toast">{{ msg }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="page-shell">
  {% block content %}{% endblock %}
</div>

<script src="{{ url_for('static', filename='js/spiderweb.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
